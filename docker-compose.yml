services:
  m4-manager:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: m4-manager
    restart: unless-stopped
    ports:
      - "8081:8081"
    volumes:
      - ./downloads:/downloads
    environment:
      - PUID=1000
      - PGID=1000
      # Optional: DOWNLOAD_DIR=/downloads (default in image)
      # Optional: LOGLEVEL=INFO
